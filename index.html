<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/png" href="/workshop_logo-w.png" />
    <script>
      (function () {
        var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
        var favicon = document.getElementById('app-favicon');
        if (!favicon) return;
        var setFavicon = function (isDark) {
          favicon.setAttribute('href', isDark ? '/workshop_logo_white-w.png' : '/workshop_logo-w.png');
        };
        setFavicon(!!(mq && mq.matches));
        if (mq && mq.addEventListener) mq.addEventListener('change', function (e) { setFavicon(e.matches); });
        else if (mq && mq.addListener) mq.addListener(function (e) { setFavicon(e.matches); });
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>workshop</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
