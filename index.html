<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/png" href="/workshop_logo-w.png" />
    <script>
      (function () {
        var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
        var favicon = document.getElementById('app-favicon');
        if (!favicon) return;
        var seedHref = favicon.getAttribute('href') || '';
        var root = seedHref.replace(/workshop_logo-w\.png(?:\?.*)?$/, '');
        var lightHref = root + 'workshop_logo-w.png';
        var darkHref = root + 'workshop_logo_white-w.png';
        var setFavicon = function (isDark) {
          favicon.setAttribute('href', isDark ? darkHref : lightHref);
        };
        setFavicon(!!(mq && mq.matches));
        if (mq && mq.addEventListener) mq.addEventListener('change', function (e) { setFavicon(e.matches); });
        else if (mq && mq.addListener) mq.addListener(function (e) { setFavicon(e.matches); });
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f14" />
    <title>workshop</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
